
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:#f0f0f0;display:flex;align-items:center;justify-content:center;min-height:600px;}

#trigger-card{
  background:#fff;
  border-radius:16px;
  border:1px solid #e8e8e8;
  padding:20px;
  width:340px;
  cursor:pointer;
  box-shadow:0 2px 16px rgba(0,0,0,0.08);
  transition:box-shadow 0.2s,transform 0.15s;
  user-select:none;
}
#trigger-card:hover{box-shadow:0 4px 24px rgba(220,38,38,0.18);transform:translateY(-2px);}

.bot-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.bot-avatar{width:44px;height:44px;border-radius:50%;background:#e41e1e;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bot-avatar svg{width:22px;height:22px;fill:#fff;}
.bot-title{font-size:15px;font-weight:600;color:#111;}
.bot-subtitle{font-size:12px;color:#22c55e;display:flex;align-items:center;gap:4px;}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;}
.bot-preview{background:#fef2f2;border-radius:10px;padding:10px 14px;font-size:13px;color:#444;border:1px solid #fecaca;}
.bot-cta{margin-top:12px;text-align:center;font-size:12px;color:#e41e1e;font-weight:500;letter-spacing:0.04em;}

#dialog-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.45);
  align-items:center;justify-content:center;
  z-index:100;
  animation:fadeIn 0.25s ease;
}
#dialog-overlay.open{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#dialog{
  width:420px;
  max-width:95vw;
  height:560px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 8px 48px rgba(0,0,0,0.22);
  animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
@keyframes slideUp{from{opacity:0;transform:translateY(40px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}

#dialog-header{
  background:#e41e1e;
  padding:16px 18px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
  position:relative;
}
.dh-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dh-avatar svg{width:20px;height:20px;fill:#fff;}
.dh-title{font-size:14px;font-weight:600;color:#fff;}
.dh-sub{font-size:11px;color:rgba(255,255,255,0.75);display:flex;align-items:center;gap:5px;margin-top:2px;}
.dh-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;}
#close-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.18);border:none;border-radius:50%;
  width:30px;height:30px;cursor:pointer;color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
#close-btn:hover{background:rgba(255,255,255,0.32);}

#canvas-area{
  position:relative;flex:1;overflow:hidden;background:#fff8f8;
}
#pw-canvas{position:absolute;inset:0;width:100%;height:100%;}

#chat-messages{
  position:absolute;bottom:8px;left:0;right:0;
  display:flex;flex-direction:column;align-items:flex-start;
  padding:0 14px;gap:6px;max-height:160px;overflow-y:auto;
  z-index:5;
}
.msg{
  max-width:75%;padding:8px 13px;border-radius:16px;
  font-size:13px;line-height:1.45;
  animation:msgIn 0.25s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{background:#fff;border:1px solid #fecaca;color:#222;border-radius:16px 16px 16px 4px;}
.msg-user{background:#e41e1e;color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px;}

#input-bar{
  padding:12px 14px;background:#fff;border-top:1px solid #f0e0e0;
  display:flex;gap:8px;align-items:center;flex-shrink:0;
}
#chat-input{
  flex:1;padding:10px 14px;border-radius:24px;border:1.5px solid #fca5a5;
  font-size:13px;font-family:system-ui,sans-serif;color:#111;outline:none;
  background:#fff;transition:border-color 0.15s;
}
#chat-input:focus{border-color:#e41e1e;}
#chat-input::placeholder{color:#ccc;}
#send-btn{
  width:36px;height:36px;border-radius:50%;background:#e41e1e;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background 0.15s,transform 0.1s;flex-shrink:0;
}
#send-btn:hover{background:#c01212;}
#send-btn:active{transform:scale(0.92);}
#send-btn svg{width:16px;height:16px;fill:#fff;}
</style>

<div id="trigger-card" onclick="openDialog()">
  <div class="bot-header">
    <div class="bot-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h2a7 7 0 017 7v1a3 3 0 01-3 3H5a3 3 0 01-3-3v-1a7 7 0 017-7h2V5.73A2 2 0 0110 4a2 2 0 012-2zm-3 9a1 1 0 100 2 1 1 0 000-2zm6 0a1 1 0 100 2 1 1 0 000-2zm-6 4h6v1H9v-1z"/></svg>
    </div>
    <div>
      <div class="bot-title">AI Assistant</div>
      <div class="bot-subtitle"><span class="dot"></span> Online &amp; Ready</div>
    </div>
  </div>
  <div class="bot-preview">Hi! I'm A Plus Bot. How can I help you today?</div>
  <div class="bot-cta">Click to open chat ↗</div>
</div>

<div id="dialog-overlay">
  <div id="dialog">
    <div id="dialog-header">
      <div class="dh-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h2a7 7 0 017 7v1a3 3 0 01-3 3H5a3 3 0 01-3-3v-1a7 7 0 017-7h2V5.73A2 2 0 0110 4a2 2 0 012-2zm-3 9a1 1 0 100 2 1 1 0 000-2zm6 0a1 1 0 100 2 1 1 0 000-2zm-6 4h6v1H9v-1z"/></svg>
      </div>
      <div>
        <div class="dh-title">AI Assistant</div>
        <div class="dh-sub"><span class="dh-dot"></span>Online &amp; Ready</div>
      </div>
      <button id="close-btn" onclick="closeDialog()">✕</button>
    </div>
    <div id="canvas-area">
      <canvas id="pw-canvas"></canvas>
      <div id="chat-messages"></div>
    </div>
    <div id="input-bar">
      <input id="chat-input" type="text" placeholder="Type your message..." maxlength="80"/>
      <button id="send-btn" onclick="handleSend()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  const overlay=document.getElementById('dialog-overlay');
  const canvas=document.getElementById('pw-canvas');
  const ctx=canvas.getContext('2d');
  const msgsEl=document.getElementById('chat-messages');
  const inputEl=document.getElementById('chat-input');

  let W,H,CX,CY,running=false,appState=0,t=0,rotY=0;
  let mouseX=-9999,mouseY=-9999;
  const N=4000,FOV=450,CAMZ=600,PHI=Math.PI*(1+Math.sqrt(5));
  const px=new Float32Array(N),py=new Float32Array(N),pz=new Float32Array(N);
  const vx=new Float32Array(N),vy=new Float32Array(N),vz=new Float32Array(N);
  const tx=new Float32Array(N),ty=new Float32Array(N),tz=new Float32Array(N);
  const ph=new Float32Array(N);

  function initCanvas(){
    const area=document.getElementById('canvas-area');
    const r=area.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    W=r.width||390;H=r.height||370;CX=W/2;CY=H/2;
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function initSphere(){
    const R=Math.min(W,H)*0.28;
    for(let i=0;i<N;i++){
      const p=Math.acos(1-2*(i+0.5)/N),a=PHI*i;
      tx[i]=Math.sin(p)*Math.cos(a)*R;
      ty[i]=Math.sin(p)*Math.sin(a)*R;
      tz[i]=Math.cos(p)*R;
    }
  }

  function initParticles(){
    for(let i=0;i<N;i++){
      px[i]=(Math.random()-0.5)*W*2;
      py[i]=(Math.random()-0.5)*H*2;
      pz[i]=(Math.random()-0.5)*600;
      vx[i]=vy[i]=vz[i]=0;
      ph[i]=Math.random()*Math.PI*2;
    }
  }

  function sampleText(phrase){
    const off=document.createElement('canvas');
    off.width=Math.floor(W);off.height=Math.floor(H);
    const c2=off.getContext('2d');
    const words=phrase.split(' ');
    const lines=[];let cur='';
    words.forEach(w=>{
      if((cur+w).length>14){lines.push(cur.trim());cur=w+' ';}
      else cur+=w+' ';
    });
    lines.push(cur.trim());
    let fs=Math.min(W*0.62/(14*0.52),H*0.38/lines.length,130);
    if(phrase.length>22)fs*=0.8;
    c2.fillStyle='#c00';
    c2.font=`900 ${fs}px Arial Black,Arial,sans-serif`;
    c2.textAlign='center';c2.textBaseline='middle';
    const lh=fs*1.1,sy=(H/2)-((lines.length-1)*lh/2)-32;
    lines.forEach((l,i)=>c2.fillText(l,W/2,sy+i*lh));
    const d=c2.getImageData(0,0,Math.floor(W),Math.floor(H)).data;
    const pts=[];
    const step=phrase.length>22?2:1;
    for(let y=0;y<H;y+=step)
      for(let x=0;x<W;x+=step)
        if(d[(y*Math.floor(W)+x)*4+3]>80)
          pts.push(x-W/2+(Math.random()-0.5)*0.7,y-H/2+(Math.random()-0.5)*0.7);
    for(let i=pts.length/2-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1)),ia=i*2,ja=j*2;
      let tmp=pts[ia];pts[ia]=pts[ja];pts[ja]=tmp;
      tmp=pts[ia+1];pts[ia+1]=pts[ja+1];pts[ja+1]=tmp;
    }
    return pts;
  }

  function formWord(phrase){
    appState=1;
    const pts=sampleText(phrase),pc=pts.length/2;
    for(let i=0;i<N;i++){
      const idx=(i%pc)*2;
      tx[i]=pts[idx];ty[i]=pts[idx+1];tz[i]=0;
    }
    rotY=0;
    setTimeout(()=>appState=2,1800);
  }

  let replyIdx=0;
  const replies=['How can I help you?','Great question!','Let me think...','On it right away!','Sure thing!','Absolutely!'];

  function addMsg(text,isUser){
    const el=document.createElement('div');
    el.className='msg '+(isUser?'msg-user':'msg-bot');
    el.textContent=text;
    msgsEl.appendChild(el);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }

  window.handleSend=function(){
    const v=inputEl.value.trim();
    if(!v)return;
    addMsg(v,true);
    inputEl.value='';
    appState=0;initSphere();
    setTimeout(()=>{
      const r=replies[replyIdx%replies.length];replyIdx++;
      addMsg(r,false);
      formWord(r);
    },350);
  };

  inputEl.addEventListener('keydown',e=>{if(e.key==='Enter')handleSend();});

  function ringAnimation(mx,my){
    if(appState<1)return;
    const t2=Date.now()*0.003;
    for(let r=0;r<3;r++){
      const radius=20+r*18+Math.sin(t2+r)*6;
      ctx.beginPath();
      ctx.arc(mx,my,radius,0,Math.PI*2);
      ctx.strokeStyle=`rgba(220,30,30,${0.18-r*0.05})`;
      ctx.lineWidth=1.5-r*0.4;
      ctx.stroke();
    }
  }

  function update(){
    t+=0.005;
    if(appState===0)rotY+=0.005;
    for(let i=0;i<N;i++){
      const cy=Math.cos(rotY),sy=Math.sin(rotY);
      let tX=tx[i]*cy-tz[i]*sy,tY=ty[i],tZ=tx[i]*sy+tz[i]*cy;
      if(appState===0){
        tX+=Math.sin(t*7+ph[i])*1.5;
        tY+=Math.cos(t*8+ph[i])*1.5;
        tZ+=Math.sin(t*6+ph[i]*2)*1.5;
      }
      vx[i]+=(tX-px[i])*0.022;
      vy[i]+=(tY-py[i])*0.022;
      vz[i]+=(tZ-pz[i])*0.022;
      if(appState>=2&&mouseX>0){
        const sc=FOV/(FOV+pz[i]+CAMZ);
        const sx=px[i]*sc+CX,sy2=py[i]*sc+CY;
        const rdx=sx-mouseX,rdy=sy2-mouseY;
        const d2=rdx*rdx+rdy*rdy;
        if(d2<7000&&d2>1){
          const d=Math.sqrt(d2),mag=5*(1-d/84)*4;
          vx[i]+=(rdx/d)*mag;vy[i]+=(rdy/d)*mag;
        }
      }
      vx[i]*=0.82;vy[i]*=0.82;vz[i]*=0.82;
      px[i]+=vx[i];py[i]+=vy[i];pz[i]+=vz[i];
    }
  }

  function draw(){
    ctx.fillStyle='rgba(255,248,248,0.2)';
    ctx.fillRect(0,0,W,H);
    for(let i=0;i<N;i++){
      const zP=pz[i]+CAMZ;
      if(zP<10)continue;
      const sc=FOV/zP;
      const sx=px[i]*sc+CX,sy=py[i]*sc+CY;
      const spd=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
      let a=Math.min(1,(0.22+spd*0.09)*(sc*0.65));
      let size=(0.4+spd*0.1)*sc;
      let h,s,l;
      if(appState>=1){h=0;s=85;l=42;a=Math.min(1,a*1.5);}
      else{h=0+Math.sin(t+i*0.01)*15;s=75;l=50;}
      ctx.beginPath();
      ctx.arc(sx,sy,size,0,6.2832);
      ctx.fillStyle=`hsla(${h},${s}%,${l}%,${a})`;
      ctx.fill();
    }
    if(mouseX>0)ringAnimation(mouseX,mouseY);
  }

  function loop(){
    if(!running)return;
    update();draw();
    requestAnimationFrame(loop);
  }

  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;
  });
  canvas.addEventListener('mouseleave',()=>{mouseX=-9999;mouseY=-9999;});

  window.openDialog=function(){
    overlay.classList.add('open');
    if(!running){
      setTimeout(()=>{
        initCanvas();initParticles();initSphere();
        running=true;loop();
        addMsg("Hi! I'm A Plus Bot. How can I help you today?",false);
        formWord("Hi there");
      },50);
    }
  };

  window.closeDialog=function(){
    overlay.classList.remove('open');
  };

  overlay.addEventListener('click',e=>{
    if(e.target===overlay)closeDialog();
  });

})();
</script>
